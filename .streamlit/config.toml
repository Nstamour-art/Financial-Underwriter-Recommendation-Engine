[server]
enableStaticServing = true

[theme]
base                   = "light"
primaryColor           = "#ff8902"
backgroundColor        = "#fcfcfc"
secondaryBackgroundColor = "#f1f0f0"
textColor              = "#32302f"
font                   = "The Future"
headingFont            = "Tiempos"
borderColor            = "#32302f"
baseRadius             = "full"
showSidebarBorder      = true

[theme.sidebar]
backgroundColor          = "#32302f"
secondaryBackgroundColor = "#3d3b39"
textColor                = "#f5f4f2"
primaryColor             = "#ff8902"
borderColor              = "#5c5a58"


[[theme.fontFaces]]
family = "The Future"
url    = "app/static/fonts/TheFuture-Regular.2367c046.woff2"
style  = "normal"
weight = 400

[[theme.fontFaces]]
family = "The Future"
url    = "app/static/fonts/TheFuture-RegularItalic.4c773deb.woff2"
style  = "italic"
weight = 400

[[theme.fontFaces]]
family = "The Future"
url    = "app/static/fonts/TheFuture-Medium.6e71f6e0.woff2"
style  = "normal"
weight = 500

[[theme.fontFaces]]
family = "The Future"
url    = "app/static/fonts/TheFuture-MediumItalic.93e73150.woff2"
style  = "italic"
weight = 500

[[theme.fontFaces]]
family = "Tiempos"
url    = "app/static/fonts/TiemposText-Regular.68f04cf8.woff2"
style  = "normal"
weight = 400 
