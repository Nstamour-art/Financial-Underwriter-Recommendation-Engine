[server]
enableStaticServing = true

[theme]
base                   = "light"
primaryColor           = "#00C8A0"
backgroundColor        = "#fcfcfc"
secondaryBackgroundColor = "#f1f0f0"
textColor              = "#32302f"
font                   = "The Future"
borderColor            = "#e4e2e1"
baseRadius             = "small"

[theme.sidebar]
backgroundColor          = "#111111"
secondaryBackgroundColor = "#1a1a1a"
textColor                = "#C0BDB9"
primaryColor             = "#00C8A0"
borderColor              = "#333333"

[[theme.fontFaces]]
family = "The Future"
url    = "app/static/fonts/TheFuture-Regular.2367c046.woff2"
style  = "normal"
weight = 400

[[theme.fontFaces]]
family = "The Future"
url    = "app/static/fonts/TheFuture-RegularItalic.4c773deb.woff2"
style  = "italic"
weight = 400

[[theme.fontFaces]]
family = "The Future"
url    = "app/static/fonts/TheFuture-Medium.6e71f6e0.woff2"
style  = "normal"
weight = 500

[[theme.fontFaces]]
family = "The Future"
url    = "app/static/fonts/TheFuture-MediumItalic.93e73150.woff2"
style  = "italic"
weight = 500
